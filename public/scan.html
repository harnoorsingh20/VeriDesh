<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scan Product - VeriDesh</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
</head>
<body>

  <nav class="navbar" style="justify-content: flex-start; gap: 24px;">
    <a href="index.html"><span class="material-icons" style="color:var(--navy); font-size:28px;">arrow_back</span></a>
    <h1 style="font-size:20px; color:var(--navy); margin:0;">Scan Product</h1>
  </nav>

  <section class="scanner-section">
    <div class="scanner-box">
      <div id="reader"></div>
      <div class="scanner-overlay">
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>
        <div class="scan-line"></div>
      </div>
    </div>
    
    <p style="color:var(--muted); text-align:center; margin-bottom:24px;">Point camera at product QR code</p>

    <div class="divider"><span>OR</span></div>

    <div class="card manual-input-card">
      <label style="display:block; margin-bottom:8px; font-weight:500;">Enter Product ID Manually</label>
      <div class="input-group">
        <span class="material-icons">search</span>
        <input type="text" id="manualInput" placeholder="e.g. PROD001">
      </div>
      <button class="btn btn-navy btn-full" id="manualVerifyBtn">Verify Product</button>
    </div>
  </section>

  <!-- Loading Overlay -->
  <div id="loadingOverlay">
    <div class="spinner"></div>
    <h3 style="color:var(--navy); margin-bottom:8px;" id="loadingText">Verifying with Gemini AI...</h3>
    <p style="color:var(--muted);">Analyzing fraud patterns...</p>
  </div>

  <!-- Result Screen Container -->
  <div id="resultScreen"></div>
  
  <div id="toast"></div>

  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
